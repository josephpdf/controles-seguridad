<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indoor Club - Control de Inventario</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <!-- Se puede colocar la imagen en public/img/logo.png -->
                <div class="logo-placeholder">
                    <span class="umbrella-icon">☔</span>
                    <h2>San José Indoor Club</h2>
                </div>
            </div>
            <h1>Control de Inventario</h1>
            <p>Radios y Llaves de Cerrajería</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" required placeholder="Ingrese su usuario">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Ingrese su contraseña">
                </div>
                <div id="loginError" class="error-msg" style="display: none;">Credenciales inválidas</div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
